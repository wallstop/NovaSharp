name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/runtime/**'
      - 'src/tooling/WallstopStudios.NovaSharp.Benchmarks/**'
      - 'src/tooling/WallstopStudios.NovaSharp.Comparison/**'
      - 'scripts/benchmarks/**'
      - 'docs/Performance.md'
      - 'docs/performance-history/**'
      - '.github/workflows/benchmarks.yml'
  workflow_dispatch:
    inputs:
      alert_threshold:
        description: 'Percentage threshold for performance regression alerts'
        required: false
        default: '115'
      fail_on_alert:
        description: 'Fail the workflow if regression is detected'
        required: false
        default: 'true'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: 'src/**/packages.lock.json'

      - name: Restore dependencies
        run: |
          # Try locked-mode first, fall back to regular restore if lock files are out of sync
          dotnet restore src/NovaSharp.sln --locked-mode || dotnet restore src/NovaSharp.sln

      - name: Restore tools
        run: dotnet tool restore

      - name: Build solution
        run: dotnet build src/NovaSharp.sln -c Release --no-restore

      - name: Run benchmarks
        id: run_benchmarks
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Running benchmarks..."
          dotnet run --project src/tooling/WallstopStudios.NovaSharp.Benchmarks/WallstopStudios.NovaSharp.Benchmarks.csproj \
            -c Release --no-build -- \
            --filter "*RuntimeBenchmarks*" \
            --exporters json
          echo "Benchmark run completed"
          # List what was created for debugging
          echo "Contents of BenchmarkDotNet.Artifacts:"
          find BenchmarkDotNet.Artifacts -type f -name "*.json" || echo "No JSON files found"
          ls -la BenchmarkDotNet.Artifacts/ || echo "BenchmarkDotNet.Artifacts directory not found"
        env:
          DOTNET_ROLL_FORWARD: Major
          # Skip Performance.md update in CI to avoid git conflicts
          NOVASHARP_SKIP_PERFORMANCE_DOC: '1'

      - name: Run same-run comparison benchmarks
        id: run_comparison_benchmarks
        continue-on-error: true
        run: |
          set -euo pipefail
          comparison_artifacts="artifacts/benchmarkdotnet/comparison"
          rm -rf "$comparison_artifacts"
          mkdir -p "$comparison_artifacts"

          echo "Running NovaSharp vs MoonSharp/NLua/Lua-CSharp comparison benchmarks on this runner..."
          dotnet run --project src/tooling/WallstopStudios.NovaSharp.Comparison/WallstopStudios.NovaSharp.Comparison.csproj \
            -c Release --no-build -- \
            --filter "*LuaPerformanceBenchmarks*" \
            --exporters json \
            --artifacts "$comparison_artifacts"
          echo "Comparison benchmark run completed"
          echo "Contents of $comparison_artifacts:"
          find "$comparison_artifacts" -type f -name "*.json" || echo "No comparison JSON files found"
        env:
          DOTNET_ROLL_FORWARD: Major

      - name: Find and validate benchmark results
        id: find_result
        continue-on-error: true
        run: |
          set -uo pipefail

          # Look for the benchmark result files
          echo "Searching for benchmark results..."

          # BenchmarkDotNet creates results in BenchmarkDotNet.Artifacts/results/
          if [ ! -d "BenchmarkDotNet.Artifacts" ]; then
            echo "::warning::BenchmarkDotNet.Artifacts directory not found"
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find the full report JSON (preferred) or any JSON with benchmark data
          result_file=""

          # First try: full compressed report
          result_file=$(find BenchmarkDotNet.Artifacts -name "*-report-full-compressed.json" -type f | head -1 || true)

          # Second try: full report (uncompressed)
          if [ -z "$result_file" ]; then
            result_file=$(find BenchmarkDotNet.Artifacts -name "*-report-full.json" -type f | head -1 || true)
          fi

          # Third try: any report with RuntimeBenchmarks
          if [ -z "$result_file" ]; then
            result_file=$(find BenchmarkDotNet.Artifacts -name "*RuntimeBenchmarks*.json" -type f | head -1 || true)
          fi

          # Fourth try: any report JSON
          if [ -z "$result_file" ]; then
            result_file=$(find BenchmarkDotNet.Artifacts -name "*-report*.json" -type f | head -1 || true)
          fi

          if [ -z "$result_file" ]; then
            echo "::warning::No benchmark result JSON file found in BenchmarkDotNet.Artifacts"
            echo "Directory contents:"
            find BenchmarkDotNet.Artifacts -type f || echo "Empty or missing"
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found benchmark result: $result_file"
          echo "result_file=$result_file" >> "$GITHUB_OUTPUT"
          echo "has_results=true" >> "$GITHUB_OUTPUT"

      - name: Transform to benchmark-action format
        id: transform
        if: steps.find_result.outputs.has_results == 'true'
        run: |
          set -euo pipefail
          python3 << 'PYTHON_SCRIPT'
          import json
          import sys
          from pathlib import Path
          import os

          # Find the benchmark results
          artifacts_dir = Path("BenchmarkDotNet.Artifacts")

          if not artifacts_dir.exists():
              print("::error::BenchmarkDotNet.Artifacts directory not found")
              sys.exit(1)

          # Search for result files in priority order
          result_files = []

          # Priority 1: Full compressed report
          result_files = list(artifacts_dir.rglob("*-report-full-compressed.json"))

          # Priority 2: Full report
          if not result_files:
              result_files = list(artifacts_dir.rglob("*-report-full.json"))

          # Priority 3: Any report with RuntimeBenchmarks
          if not result_files:
              result_files = [f for f in artifacts_dir.rglob("*.json") if "RuntimeBenchmarks" in f.name]

          # Priority 4: Any report JSON
          if not result_files:
              result_files = [f for f in artifacts_dir.rglob("*-report*.json")]

          if not result_files:
              print("::error::No benchmark JSON files found")
              print(f"Contents of {artifacts_dir}:")
              for p in artifacts_dir.rglob("*"):
                  print(f"  {p}")
              sys.exit(1)

          result_file = result_files[0]
          print(f"Processing: {result_file}")

          with open(result_file) as f:
              data = json.load(f)

          # Transform to github-action-benchmark format
          benchmarks = []
          benchmark_list = data.get("Benchmarks", [])

          if not benchmark_list:
              print("::warning::No benchmarks found in result file, creating placeholder")
              # Create a placeholder so the workflow doesn't fail
              benchmarks.append({
                  "name": "NovaSharp.Placeholder",
                  "unit": "ns",
                  "value": 0,
                  "extra": "No benchmark data available"
              })
          else:
              for benchmark in benchmark_list:
                  name = benchmark.get("FullName", benchmark.get("Method", "Unknown"))
                  stats = benchmark.get("Statistics", {})
                  mean_ns = stats.get("Mean", 0)

                  # Handle case where Statistics might be missing
                  if not stats and "Mean" in benchmark:
                      mean_ns = benchmark.get("Mean", 0)

                  # Convert nanoseconds to appropriate unit for readability
                  if mean_ns > 1_000_000_000:
                      value = mean_ns / 1_000_000_000
                      unit = "s"
                  elif mean_ns > 1_000_000:
                      value = mean_ns / 1_000_000
                      unit = "ms"
                  elif mean_ns > 1_000:
                      value = mean_ns / 1_000
                      unit = "μs"
                  else:
                      value = mean_ns
                      unit = "ns"

                  p95 = stats.get("P95", 0)
                  extra = f"P95: {p95 / 1_000:.3f}μs" if p95 else ""

                  benchmarks.append({
                      "name": name,
                      "unit": unit,
                      "value": round(value, 3),
                      "extra": extra
                  })

          # Write output
          output_path = Path("benchmark-results.json")
          with open(output_path, "w") as f:
              json.dump(benchmarks, f, indent=2)

          print(f"Wrote {len(benchmarks)} benchmarks to {output_path}")

          # Verify the file was created
          if not output_path.exists():
              print("::error::Failed to create benchmark-results.json")
              sys.exit(1)

          print(f"File size: {output_path.stat().st_size} bytes")

          # Also write to step summary
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a") as f:
                  f.write("## Benchmark Results\n\n")
                  f.write("| Name | Value | Unit | Extra |\n")
                  f.write("|------|-------|------|-------|\n")
                  for b in benchmarks:
                      f.write(f"| {b['name']} | {b['value']} | {b['unit']} | {b.get('extra', '')} |\n")
                  f.write("\n")

          print("Transform completed successfully")
          PYTHON_SCRIPT

      - name: Verify benchmark-results.json exists
        id: verify_results
        if: steps.find_result.outputs.has_results == 'true'
        run: |
          if [ ! -f "benchmark-results.json" ]; then
            echo "::warning::benchmark-results.json was not created"
            echo "has_output=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "benchmark-results.json contents:"
          cat benchmark-results.json
          echo ""
          echo "has_output=true" >> "$GITHUB_OUTPUT"

      - name: Render benchmark delta matrix
        id: benchmark_deltas
        if: steps.find_result.outputs.has_results == 'true'
        run: |
          set -euo pipefail
          delta_out="$(python3 scripts/benchmarks/render-benchmark-deltas.py \
            --current-root BenchmarkDotNet.Artifacts \
            --comparison-root artifacts/benchmarkdotnet/comparison \
            --self-baseline-root docs/performance-history/current-baseline \
            --output artifacts/benchmark-deltas.md)"
          printf '%s\n' "$delta_out"
          changed="$(printf '%s\n' "$delta_out" | sed -n 's/^changed=//p' | tail -n1)"
          regressed="$(printf '%s\n' "$delta_out" | sed -n 's/^regressed=//p' | tail -n1)"
          external_rows="$(printf '%s\n' "$delta_out" | sed -n 's/^external_rows=//p' | tail -n1)"
          missing_external_runtime_cells="$(printf '%s\n' "$delta_out" | sed -n 's/^missing_external_runtime_cells=//p' | tail -n1)"
          self_rows="$(printf '%s\n' "$delta_out" | sed -n 's/^self_rows=//p' | tail -n1)"
          {
            echo "has_report=true"
            echo "report_file=artifacts/benchmark-deltas.md"
            echo "changed=${changed:-false}"
            echo "regressed=${regressed:-false}"
            echo "external_rows=${external_rows:-0}"
            echo "missing_external_runtime_cells=${missing_external_runtime_cells:-0}"
            echo "self_rows=${self_rows:-0}"
          } >> "$GITHUB_OUTPUT"

          if [ -f artifacts/benchmark-deltas.md ]; then
            cat artifacts/benchmark-deltas.md >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash

      - name: Warn on benchmark self-regression signal
        if: steps.benchmark_deltas.outputs.regressed == 'true'
        run: |
          echo "::warning::Benchmark delta report flagged one or more worse-than-self-baseline metrics. Review the PR comment and artifacts before merging."
        shell: bash

      - name: Warn when external comparison rows are unavailable
        if: steps.benchmark_deltas.outputs.has_report == 'true' && steps.benchmark_deltas.outputs.external_rows == '0'
        run: |
          echo "::warning::No external comparison rows were rendered. Check the same-run comparison benchmark logs and artifacts."
        shell: bash

      - name: Warn when expected external comparison cells are missing
        if: steps.benchmark_deltas.outputs.has_report == 'true' && steps.benchmark_deltas.outputs.missing_external_runtime_cells != '0'
        run: |
          echo "::warning::Expected external runtime cells were missing. Check the same-run comparison benchmark logs and artifacts."
        shell: bash

      - name: Comment benchmark comparison deltas on PR
        if: github.event_name == 'pull_request' && steps.benchmark_deltas.outputs.has_report == 'true'
        uses: actions/github-script@v8
        env:
          BENCHMARK_DELTAS_FILE: ${{ steps.benchmark_deltas.outputs.report_file }}
          BENCHMARK_CHANGED: ${{ steps.benchmark_deltas.outputs.changed }}
          BENCHMARK_REGRESSED: ${{ steps.benchmark_deltas.outputs.regressed }}
          BENCHMARK_EXTERNAL_ROWS: ${{ steps.benchmark_deltas.outputs.external_rows }}
          BENCHMARK_MISSING_EXTERNAL_RUNTIME_CELLS: ${{ steps.benchmark_deltas.outputs.missing_external_runtime_cells }}
          BENCHMARK_SELF_ROWS: ${{ steps.benchmark_deltas.outputs.self_rows }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- novasharp-benchmark-deltas -->';
            const reportPath = process.env.BENCHMARK_DELTAS_FILE;
            let report = '';
            if (reportPath && fs.existsSync(reportPath)) {
              report = fs.readFileSync(reportPath, 'utf8').trim();
            } else {
              report = 'Benchmark delta report was not generated.';
            }
            const changed = process.env.BENCHMARK_CHANGED === 'true';
            const regressed = process.env.BENCHMARK_REGRESSED === 'true';
            const externalRows = process.env.BENCHMARK_EXTERNAL_ROWS || '0';
            const missingExternalRuntimeCells = process.env.BENCHMARK_MISSING_EXTERNAL_RUNTIME_CELLS || '0';
            const selfRows = process.env.BENCHMARK_SELF_ROWS || '0';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              report,
              '',
              `Changed beyond tolerance: ${changed ? 'yes' : 'no'}. Self-regression signal: ${regressed ? 'yes' : 'no'}.`,
              `External runtime cells: ${externalRows}. Missing expected external cells: ${missingExternalRuntimeCells}. Self-baseline rows: ${selfRows}.`,
              '',
              `_Generated by benchmark CI ([run logs](${runUrl}))._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Set output when no results
        id: set_no_output
        if: steps.find_result.outputs.has_results != 'true'
        run: |
          echo "has_output=false" >> "$GITHUB_OUTPUT"
          echo "::warning::No benchmark results available to store"

      - name: Clean up local changes before branch operations
        run: |
          # The benchmark harness may update docs/Performance.md locally.
          # Discard these changes so git can switch branches cleanly.
          git checkout -- docs/Performance.md || true

      - name: Check if gh-pages branch exists
        id: check_gh_pages
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "gh-pages branch exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "gh-pages branch does not exist"
          fi

      - name: Create gh-pages branch
        if: steps.check_gh_pages.outputs.exists == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Creating gh-pages branch for benchmark storage..."
          # Create orphan branch with initial benchmark data structure
          git checkout --orphan gh-pages
          git reset --hard
          mkdir -p benchmarks
          echo '[]' > benchmarks/data.js
          echo '# Benchmark Results' > README.md
          echo '' >> README.md
          echo 'This branch contains historical benchmark data for NovaSharp.' >> README.md
          git add benchmarks/data.js README.md
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Initialize gh-pages branch for benchmark storage"
          git push origin gh-pages
          # Return to original branch
          git checkout -
          echo "gh-pages branch created successfully"

      - name: Check if benchmark results file exists
        id: check_results_file
        run: |
          if [ -f "benchmark-results.json" ]; then
            echo "file_exists=true" >> "$GITHUB_OUTPUT"
            echo "benchmark-results.json exists"
            ls -la benchmark-results.json
          else
            echo "file_exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::benchmark-results.json does not exist"
          fi

      - name: Store benchmark results
        # Only run if the file physically exists AND gh-pages exists (either pre-existing or just created)
        if: |
          steps.check_results_file.outputs.file_exists == 'true' &&
          (steps.check_gh_pages.outputs.exists == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: NovaSharp Benchmarks
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Auto-push only on main branch pushes
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          # Alert threshold (default 115% = 15% regression)
          alert-threshold: ${{ github.event.inputs.alert_threshold || '115%' }}
          # Hosted PR runners are too noisy for single-sample microbenchmark alerts
          # to be reliable merge gates. Keep PR alerts visible in comments/artifacts,
          # and reserve failing alerts for explicit manual benchmark runs.
          fail-on-alert: ${{ github.event.inputs.fail_on_alert == 'true' }}
          # Comment on PR with results
          comment-on-alert: true
          # Store data in gh-pages branch under benchmarks directory
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Skip benchmark storage (no gh-pages branch or no results)
        if: |
          steps.check_results_file.outputs.file_exists != 'true' ||
          (steps.check_gh_pages.outputs.exists == 'false' && !(github.event_name == 'push' && github.ref == 'refs/heads/main'))
        run: |
          if [ "${{ steps.check_results_file.outputs.file_exists }}" != "true" ]; then
            echo "::warning::Skipping benchmark storage - benchmark-results.json was not created."
          else
            echo "::warning::Skipping benchmark storage - gh-pages branch does not exist."
            echo "The gh-pages branch will be created on the next push to main."
          fi
          echo "Benchmark results are still available in the uploaded artifacts (if any)."

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: benchmark-results
          path: |
            BenchmarkDotNet.Artifacts/
            artifacts/benchmarkdotnet/comparison/
            benchmark-results.json
            artifacts/benchmark-deltas.md
          if-no-files-found: warn

  comparison:
    name: comparison
    runs-on: ubuntu-latest
    needs: benchmark
    if: always()
    timeout-minutes: 5
    steps:
      - name: Confirm same-run comparison location
        if: needs.benchmark.result == 'success'
        run: |
          echo "Comparison benchmarks now run inside the benchmark job so external runtime deltas use the same runner hardware."
          echo "Inspect the benchmark-results artifact for artifacts/benchmarkdotnet/comparison/."

      - name: Propagate benchmark job failure
        if: needs.benchmark.result != 'success'
        run: |
          echo "::error::The benchmark job did not complete successfully; same-run comparison artifacts may be missing."
          exit 1
