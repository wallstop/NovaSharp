name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/runtime/**'
      - 'src/tooling/WallstopStudios.NovaSharp.Benchmarks/**'
      - 'src/tooling/WallstopStudios.NovaSharp.Comparison/**'
      - 'scripts/benchmarks/**'
      - 'docs/Performance.md'
      - 'docs/performance-history/**'
      - 'progress/benchmarks/**'
      - '.github/workflows/benchmarks.yml'
  workflow_dispatch:
    inputs:
      alert_threshold:
        description: 'Percentage threshold for performance regression alerts'
        required: false
        default: '115'
      fail_on_alert:
        description: 'Fail the workflow if regression is detected'
        required: false
        default: 'true'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  runtime-benchmark:
    name: runtime benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTNET_ROLL_FORWARD: Major
      NOVASHARP_SKIP_PERFORMANCE_DOC: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: 'src/**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore src/NovaSharp.sln --locked-mode || dotnet restore src/NovaSharp.sln

      - name: Build runtime benchmarks
        run: dotnet build src/tooling/WallstopStudios.NovaSharp.Benchmarks/WallstopStudios.NovaSharp.Benchmarks.csproj -c Release --no-restore

      - name: Run runtime benchmarks
        run: |
          set -euo pipefail
          dotnet run --project src/tooling/WallstopStudios.NovaSharp.Benchmarks/WallstopStudios.NovaSharp.Benchmarks.csproj \
            -c Release --no-build -- \
            --filter "*RuntimeBenchmarks*"

      - name: Verify runtime benchmark results
        run: |
          set -euo pipefail
          if ! find BenchmarkDotNet.Artifacts -name "*-report*.json" -type f | grep -q .; then
            echo "::error::Runtime benchmark job did not produce a BenchmarkDotNet JSON report."
            exit 1
          fi

      - name: Upload runtime benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: runtime-benchmark-artifacts
          path: BenchmarkDotNet.Artifacts/
          if-no-files-found: error

  comparison-scenario:
    name: comparison ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - NumericLoops
          - TableMutation
          - TowerOfHanoi
          - EightQueens
          - CoroutinePingPong
          - FibonacciRecursive
          - NBody
          - BinaryTrees
          - SpectralNorm
          - TableIntFillIter
          - TableStringKeyLookup
          - TableNextTraversal
          - TableInsertRemove
          - StringConcatChains
          - StringPatternOps
          - StringFormat
    env:
      DOTNET_ROLL_FORWARD: Major
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: 'src/**/packages.lock.json'

      - name: Install reference Lua CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
          lua5.4 -v

      - name: Restore dependencies
        run: dotnet restore src/NovaSharp.sln --locked-mode || dotnet restore src/NovaSharp.sln

      - name: Build comparison benchmarks
        run: dotnet build src/tooling/WallstopStudios.NovaSharp.Comparison/WallstopStudios.NovaSharp.Comparison.csproj -c Release --no-restore

      - name: Run scenario comparison benchmark
        run: |
          set -euo pipefail
          scenario="${{ matrix.scenario }}"
          output_root="artifacts/benchmarkdotnet/comparison/${scenario}"
          rm -rf "$output_root"
          mkdir -p "$output_root"

          dotnet run --project src/tooling/WallstopStudios.NovaSharp.Comparison/WallstopStudios.NovaSharp.Comparison.csproj \
            -c Release --no-build -- \
            --filter "*${scenario}*" \
            --artifacts "$output_root"

          if ! find "$output_root" -name "*-report-full-compressed.json" -type f | grep -q .; then
            echo "::error::Scenario comparison benchmark did not produce a full compressed JSON report for ${scenario}."
            find "$output_root" -maxdepth 4 -type f | sort || true
            exit 1
          fi

      - name: Run Lua CLI context for scenario
        run: |
          set -euo pipefail
          scenario="${{ matrix.scenario }}"
          scenario_dir="artifacts/benchmarkdotnet/lua-cli-scenarios/${scenario}"
          output_root="artifacts/benchmarkdotnet/comparison/${scenario}"
          rm -rf "$scenario_dir"
          mkdir -p "$scenario_dir"

          dotnet run --project src/tooling/WallstopStudios.NovaSharp.Comparison/WallstopStudios.NovaSharp.Comparison.csproj \
            -c Release --no-build -- \
            --export-scenarios "$scenario_dir"

          find "$scenario_dir" -type f ! -name "${scenario}.lua" -delete
          if [ ! -f "$scenario_dir/${scenario}.lua" ]; then
            echo "::error::Expected exported Lua scenario ${scenario}.lua was not produced."
            find "$scenario_dir" -maxdepth 2 -type f | sort || true
            exit 1
          fi

          python3 scripts/benchmarks/run-lua-cli-context.py \
            --scenario-dir "$scenario_dir" \
            --output-root "$output_root" \
            --lua-cmd lua5.4

      - name: Upload scenario comparison artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: comparison-scenario-${{ matrix.scenario }}
          path: artifacts/benchmarkdotnet/comparison/${{ matrix.scenario }}/
          if-no-files-found: error

  comparison-interop:
    name: comparison ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: LuaToClrInterop
            filter: '*LuaToClrInterop*'
          - name: ClrToLuaInterop
            filter: '*ClrToLuaInterop*'
    env:
      DOTNET_ROLL_FORWARD: Major
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: 'src/**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore src/NovaSharp.sln --locked-mode || dotnet restore src/NovaSharp.sln

      - name: Build comparison benchmarks
        run: dotnet build src/tooling/WallstopStudios.NovaSharp.Comparison/WallstopStudios.NovaSharp.Comparison.csproj -c Release --no-restore

      - name: Run interop comparison benchmark
        run: |
          set -euo pipefail
          output_root="artifacts/benchmarkdotnet/comparison/interop-${{ matrix.name }}"
          rm -rf "$output_root"
          mkdir -p "$output_root"

          dotnet run --project src/tooling/WallstopStudios.NovaSharp.Comparison/WallstopStudios.NovaSharp.Comparison.csproj \
            -c Release --no-build -- \
            --filter "${{ matrix.filter }}" \
            --artifacts "$output_root"

          if ! find "$output_root" -name "*-report-full-compressed.json" -type f | grep -q .; then
            echo "::error::Interop comparison benchmark did not produce a full compressed JSON report for ${{ matrix.name }}."
            find "$output_root" -maxdepth 4 -type f | sort || true
            exit 1
          fi

      - name: Upload interop comparison artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: comparison-interop-${{ matrix.name }}
          path: artifacts/benchmarkdotnet/comparison/interop-${{ matrix.name }}/
          if-no-files-found: error

  benchmark-report:
    name: benchmark aggregate report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - runtime-benchmark
      - comparison-scenario
      - comparison-interop
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Capture split job status
        id: split_status
        run: |
          set -euo pipefail
          failed=false
          if [ "${{ needs.runtime-benchmark.result }}" != "success" ]; then
            echo "::warning::Runtime benchmark job finished with ${{ needs.runtime-benchmark.result }}."
            failed=true
          fi
          if [ "${{ needs.comparison-scenario.result }}" != "success" ]; then
            echo "::warning::Scenario comparison matrix finished with ${{ needs.comparison-scenario.result }}."
            failed=true
          fi
          if [ "${{ needs.comparison-interop.result }}" != "success" ]; then
            echo "::warning::Interop comparison matrix finished with ${{ needs.comparison-interop.result }}."
            failed=true
          fi
          echo "failed=${failed}" >> "$GITHUB_OUTPUT"

      - name: Download runtime benchmark artifacts
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: runtime-benchmark-artifacts
          path: artifacts/benchmarkdotnet/runtime-download

      - name: Download comparison benchmark artifacts
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          pattern: comparison-*
          path: artifacts/benchmarkdotnet/comparison-download

      - name: Verify downloaded benchmark artifacts
        if: steps.split_status.outputs.failed != 'true'
        run: |
          set -euo pipefail
          runtime_root="artifacts/benchmarkdotnet/runtime-download"
          comparison_root="artifacts/benchmarkdotnet/comparison-download"
          missing=false

          require_report() {
            local root="$1"
            local pattern="$2"
            local label="$3"
            if find "$root" -name "$pattern" -type f | grep -q .; then
              echo "Found ${label}."
              return
            fi

            echo "::error::Missing ${label} under ${root}."
            missing=true
          }

          require_report "$runtime_root" "*RuntimeBenchmarks-report-full-compressed.json" "runtime benchmark JSON report"

          scenarios=(
            NumericLoops
            TableMutation
            TowerOfHanoi
            EightQueens
            CoroutinePingPong
            FibonacciRecursive
            NBody
            BinaryTrees
            SpectralNorm
            TableIntFillIter
            TableStringKeyLookup
            TableNextTraversal
            TableInsertRemove
            StringConcatChains
            StringPatternOps
            StringFormat
          )
          for scenario in "${scenarios[@]}"; do
            scenario_root="${comparison_root}/comparison-scenario-${scenario}"
            require_report "$scenario_root" "*LuaPerformanceBenchmarks-report-full-compressed.json" "${scenario} comparison BenchmarkDotNet JSON report"
            require_report "$scenario_root" "*ReferenceLuaCli-report-full-compressed.json" "${scenario} reference lua CLI JSON report"
          done

          interops=(LuaToClrInterop ClrToLuaInterop)
          for interop in "${interops[@]}"; do
            interop_root="${comparison_root}/comparison-interop-${interop}"
            require_report "$interop_root" "*LuaInteropBenchmarks-report-full-compressed.json" "${interop} interop BenchmarkDotNet JSON report"
          done

          if [ "$missing" = "true" ]; then
            echo "::group::Downloaded benchmark artifact tree"
            find artifacts/benchmarkdotnet -maxdepth 6 -type f | sort || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Find and validate benchmark results
        id: find_result
        run: |
          set -euo pipefail

          echo "Searching downloaded runtime benchmark results..."
          runtime_artifacts="artifacts/benchmarkdotnet/runtime-download"
          if [ ! -d "$runtime_artifacts" ]; then
            if [ "${{ steps.split_status.outputs.failed }}" = "true" ]; then
              echo "::warning::Downloaded runtime benchmark artifact directory not found after a split job failure."
              echo "has_results=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Downloaded runtime benchmark artifact directory not found."
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          result_file=""
          result_file=$(find "$runtime_artifacts" -name "*-report-full-compressed.json" -type f | head -1 || true)

          if [ -z "$result_file" ]; then
            result_file=$(find "$runtime_artifacts" -name "*-report-full.json" -type f | head -1 || true)
          fi

          if [ -z "$result_file" ]; then
            result_file=$(find "$runtime_artifacts" -name "*RuntimeBenchmarks*.json" -type f | head -1 || true)
          fi

          if [ -z "$result_file" ]; then
            result_file=$(find "$runtime_artifacts" -name "*-report*.json" -type f | head -1 || true)
          fi

          if [ -z "$result_file" ]; then
            if [ "${{ steps.split_status.outputs.failed }}" = "true" ]; then
              echo "::warning::No benchmark result JSON file found in downloaded runtime artifacts after a split job failure."
              find "$runtime_artifacts" -type f || echo "Empty or missing"
              echo "has_results=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::No benchmark result JSON file found in downloaded runtime artifacts."
            find "$runtime_artifacts" -type f || echo "Empty or missing"
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Found benchmark result: $result_file"
          echo "result_file=$result_file" >> "$GITHUB_OUTPUT"
          echo "has_results=true" >> "$GITHUB_OUTPUT"

      - name: Transform to benchmark-action format
        id: transform
        if: steps.find_result.outputs.has_results == 'true'
        run: |
          set -euo pipefail
          python3 << 'PYTHON_SCRIPT'
          import json
          import sys
          from pathlib import Path
          import os

          artifacts_dir = Path("artifacts/benchmarkdotnet/runtime-download")

          if not artifacts_dir.exists():
              print("::error::Downloaded runtime benchmark artifact directory not found")
              sys.exit(1)

          result_files = list(artifacts_dir.rglob("*-report-full-compressed.json"))

          if not result_files:
              result_files = list(artifacts_dir.rglob("*-report-full.json"))

          if not result_files:
              result_files = [f for f in artifacts_dir.rglob("*.json") if "RuntimeBenchmarks" in f.name]

          if not result_files:
              result_files = [f for f in artifacts_dir.rglob("*-report*.json")]

          if not result_files:
              print("::error::No benchmark JSON files found")
              print(f"Contents of {artifacts_dir}:")
              for p in artifacts_dir.rglob("*"):
                  print(f"  {p}")
              sys.exit(1)

          result_file = result_files[0]
          print(f"Processing: {result_file}")

          with open(result_file) as f:
              data = json.load(f)

          benchmarks = []
          benchmark_list = data.get("Benchmarks", [])

          if not benchmark_list:
              print("::warning::No benchmarks found in result file, creating placeholder")
              benchmarks.append({
                  "name": "NovaSharp.Placeholder",
                  "unit": "ns",
                  "value": 0,
                  "extra": "No benchmark data available"
              })
          else:
              for benchmark in benchmark_list:
                  name = benchmark.get("FullName", benchmark.get("Method", "Unknown"))
                  stats = benchmark.get("Statistics", {})
                  mean_ns = stats.get("Mean", 0)

                  if not stats and "Mean" in benchmark:
                      mean_ns = benchmark.get("Mean", 0)

                  if mean_ns > 1_000_000_000:
                      value = mean_ns / 1_000_000_000
                      unit = "s"
                  elif mean_ns > 1_000_000:
                      value = mean_ns / 1_000_000
                      unit = "ms"
                  elif mean_ns > 1_000:
                      value = mean_ns / 1_000
                      unit = "μs"
                  else:
                      value = mean_ns
                      unit = "ns"

                  p95 = stats.get("P95", 0)
                  extra = f"P95: {p95 / 1_000:.3f}μs" if p95 else ""

                  benchmarks.append({
                      "name": name,
                      "unit": unit,
                      "value": round(value, 3),
                      "extra": extra
                  })

          output_path = Path("benchmark-results.json")
          with open(output_path, "w") as f:
              json.dump(benchmarks, f, indent=2)

          print(f"Wrote {len(benchmarks)} benchmarks to {output_path}")

          if not output_path.exists():
              print("::error::Failed to create benchmark-results.json")
              sys.exit(1)

          print(f"File size: {output_path.stat().st_size} bytes")

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a") as f:
                  f.write("## Benchmark Results\n\n")
                  f.write("| Name | Value | Unit | Extra |\n")
                  f.write("|------|-------|------|-------|\n")
                  for b in benchmarks:
                      f.write(f"| {b['name']} | {b['value']} | {b['unit']} | {b.get('extra', '')} |\n")
                  f.write("\n")

          print("Transform completed successfully")
          PYTHON_SCRIPT

      - name: Verify benchmark-results.json exists
        id: verify_results
        if: steps.find_result.outputs.has_results == 'true'
        run: |
          if [ ! -f "benchmark-results.json" ]; then
            echo "::warning::benchmark-results.json was not created"
            echo "has_output=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "benchmark-results.json contents:"
          cat benchmark-results.json
          echo ""
          echo "has_output=true" >> "$GITHUB_OUTPUT"

      - name: Render benchmark delta matrix
        id: benchmark_deltas
        if: steps.find_result.outputs.has_results == 'true'
        run: |
          set -euo pipefail
          phase_baseline="progress/benchmarks/phase-a0-scoreboard-baseline.json"
          phase_gate_args=(--phase-baseline "$phase_baseline")
          if [ -f "$phase_baseline" ]; then
            phase_gate_args+=(--enforce-phase-gates)
          else
            echo "::warning::Phase A0 scoreboard baseline not found at ${phase_baseline}; ratio and exact B/op gates are report-only until the baseline is committed."
          fi
          set +e
          delta_out="$(python3 scripts/benchmarks/render-benchmark-deltas.py \
            --current-root artifacts/benchmarkdotnet/runtime-download \
            --comparison-root artifacts/benchmarkdotnet/comparison-download \
            --self-baseline-root docs/performance-history/current-baseline \
            --output artifacts/benchmark-deltas.md \
            --expect-lua-cli \
            "${phase_gate_args[@]}" 2>artifacts/benchmark-deltas.err)"
          render_status=$?
          set -e
          printf '%s\n' "$delta_out"
          if [ -s artifacts/benchmark-deltas.err ]; then
            cat artifacts/benchmark-deltas.err >&2
          fi
          changed="$(printf '%s\n' "$delta_out" | sed -n 's/^changed=//p' | tail -n1)"
          regressed="$(printf '%s\n' "$delta_out" | sed -n 's/^regressed=//p' | tail -n1)"
          external_rows="$(printf '%s\n' "$delta_out" | sed -n 's/^external_rows=//p' | tail -n1)"
          missing_external_runtime_cells="$(printf '%s\n' "$delta_out" | sed -n 's/^missing_external_runtime_cells=//p' | tail -n1)"
          missing_lua_cli_rows="$(printf '%s\n' "$delta_out" | sed -n 's/^missing_lua_cli_rows=//p' | tail -n1)"
          self_rows="$(printf '%s\n' "$delta_out" | sed -n 's/^self_rows=//p' | tail -n1)"
          phase_baseline_rows="$(printf '%s\n' "$delta_out" | sed -n 's/^phase_baseline_rows=//p' | tail -n1)"
          phase_gate_failures="$(printf '%s\n' "$delta_out" | sed -n 's/^phase_gate_failures=//p' | tail -n1)"
          {
            echo "has_report=true"
            echo "report_file=artifacts/benchmark-deltas.md"
            echo "changed=${changed:-false}"
            echo "regressed=${regressed:-false}"
            echo "external_rows=${external_rows:-0}"
            echo "missing_external_runtime_cells=${missing_external_runtime_cells:-0}"
            echo "missing_lua_cli_rows=${missing_lua_cli_rows:-0}"
            echo "self_rows=${self_rows:-0}"
            echo "phase_baseline_rows=${phase_baseline_rows:-0}"
            echo "phase_gate_failures=${phase_gate_failures:-0}"
            echo "render_status=${render_status}"
          } >> "$GITHUB_OUTPUT"

          if [ -f artifacts/benchmark-deltas.md ]; then
            cat artifacts/benchmark-deltas.md >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash

      - name: Warn on benchmark self-regression signal
        if: steps.benchmark_deltas.outputs.regressed == 'true'
        run: |
          echo "::warning::Benchmark delta report flagged one or more worse-than-self-baseline metrics. Review the PR comment and artifacts before merging."
        shell: bash

      - name: Warn when external comparison rows are unavailable
        if: steps.benchmark_deltas.outputs.has_report == 'true' && steps.benchmark_deltas.outputs.external_rows == '0'
        run: |
          echo "::warning::No external comparison rows were rendered. Check the split comparison benchmark logs and artifacts."
        shell: bash

      - name: Warn when expected external comparison cells are missing
        if: steps.benchmark_deltas.outputs.has_report == 'true' && steps.benchmark_deltas.outputs.missing_external_runtime_cells != '0'
        run: |
          echo "::warning::Expected external runtime cells were missing. Check the split comparison benchmark logs and artifacts."
        shell: bash

      - name: Warn when reference lua CLI context is missing
        if: steps.benchmark_deltas.outputs.has_report == 'true' && steps.benchmark_deltas.outputs.missing_lua_cli_rows != '0'
        run: |
          echo "::warning::Reference lua CLI wall-time context was expected but missing. Check the comparison benchmark logs and artifacts."
        shell: bash

      - name: Warn when Phase A0 benchmark gates are unavailable
        if: steps.benchmark_deltas.outputs.has_report == 'true' && steps.benchmark_deltas.outputs.phase_baseline_rows == '0'
        run: |
          echo "::warning::Phase A0 benchmark baseline is not committed yet, so ratio and exact B/op gates were not enforced."
        shell: bash

      - name: Comment benchmark comparison deltas on PR
        if: github.event_name == 'pull_request' && steps.benchmark_deltas.outputs.has_report == 'true'
        uses: actions/github-script@v8
        env:
          BENCHMARK_DELTAS_FILE: ${{ steps.benchmark_deltas.outputs.report_file }}
          BENCHMARK_CHANGED: ${{ steps.benchmark_deltas.outputs.changed }}
          BENCHMARK_REGRESSED: ${{ steps.benchmark_deltas.outputs.regressed }}
          BENCHMARK_EXTERNAL_ROWS: ${{ steps.benchmark_deltas.outputs.external_rows }}
          BENCHMARK_MISSING_EXTERNAL_RUNTIME_CELLS: ${{ steps.benchmark_deltas.outputs.missing_external_runtime_cells }}
          BENCHMARK_MISSING_LUA_CLI_ROWS: ${{ steps.benchmark_deltas.outputs.missing_lua_cli_rows }}
          BENCHMARK_SELF_ROWS: ${{ steps.benchmark_deltas.outputs.self_rows }}
          BENCHMARK_PHASE_BASELINE_ROWS: ${{ steps.benchmark_deltas.outputs.phase_baseline_rows }}
          BENCHMARK_PHASE_GATE_FAILURES: ${{ steps.benchmark_deltas.outputs.phase_gate_failures }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- novasharp-benchmark-deltas -->';
            const reportPath = process.env.BENCHMARK_DELTAS_FILE;
            let report = '';
            if (reportPath && fs.existsSync(reportPath)) {
              report = fs.readFileSync(reportPath, 'utf8').trim();
            } else {
              report = 'Benchmark delta report was not generated.';
            }
            const changed = process.env.BENCHMARK_CHANGED === 'true';
            const regressed = process.env.BENCHMARK_REGRESSED === 'true';
            const externalRows = process.env.BENCHMARK_EXTERNAL_ROWS || '0';
            const missingExternalRuntimeCells = process.env.BENCHMARK_MISSING_EXTERNAL_RUNTIME_CELLS || '0';
            const missingLuaCliRows = process.env.BENCHMARK_MISSING_LUA_CLI_ROWS || '0';
            const selfRows = process.env.BENCHMARK_SELF_ROWS || '0';
            const phaseBaselineRows = process.env.BENCHMARK_PHASE_BASELINE_ROWS || '0';
            const phaseGateFailures = process.env.BENCHMARK_PHASE_GATE_FAILURES || '0';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              report,
              '',
              `Changed beyond tolerance: ${changed ? 'yes' : 'no'}. Self-regression signal: ${regressed ? 'yes' : 'no'}.`,
              `External runtime cells: ${externalRows}. Missing expected external cells: ${missingExternalRuntimeCells}. Missing lua CLI rows: ${missingLuaCliRows}. Self-baseline rows: ${selfRows}.`,
              `Phase A0 baseline rows: ${phaseBaselineRows}. Phase A0 gate failures: ${phaseGateFailures}.`,
              '',
              `_Generated by benchmark CI ([run logs](${runUrl}))._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail when benchmark delta gates failed
        if: steps.benchmark_deltas.outputs.has_report == 'true' && steps.benchmark_deltas.outputs.render_status != '0'
        run: |
          echo "::error::Benchmark delta renderer or Phase A0 gates failed. Review artifacts/benchmark-deltas.md and the PR benchmark comment."
          exit 1
        shell: bash

      - name: Set output when no results
        id: set_no_output
        if: steps.find_result.outputs.has_results != 'true'
        run: |
          echo "has_output=false" >> "$GITHUB_OUTPUT"
          echo "::warning::No benchmark results available to store"

      - name: Clean up local changes before branch operations
        run: |
          # The benchmark harness may update docs/Performance.md locally.
          # Discard these changes so git can switch branches cleanly.
          git checkout -- docs/Performance.md || true

      - name: Check if gh-pages branch exists
        id: check_gh_pages
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "gh-pages branch exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "gh-pages branch does not exist"
          fi

      - name: Create gh-pages branch
        if: steps.check_gh_pages.outputs.exists == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Creating gh-pages branch for benchmark storage..."
          git checkout --orphan gh-pages
          git reset --hard
          mkdir -p benchmarks
          echo '[]' > benchmarks/data.js
          echo '# Benchmark Results' > README.md
          echo '' >> README.md
          echo 'This branch contains historical benchmark data for NovaSharp.' >> README.md
          git add benchmarks/data.js README.md
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Initialize gh-pages branch for benchmark storage"
          git push origin gh-pages
          git checkout -
          echo "gh-pages branch created successfully"

      - name: Check if benchmark results file exists
        id: check_results_file
        run: |
          if [ -f "benchmark-results.json" ]; then
            echo "file_exists=true" >> "$GITHUB_OUTPUT"
            echo "benchmark-results.json exists"
            ls -la benchmark-results.json
          else
            echo "file_exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::benchmark-results.json does not exist"
          fi

      - name: Store benchmark results
        if: |
          steps.split_status.outputs.failed != 'true' &&
          steps.check_results_file.outputs.file_exists == 'true' &&
          (steps.check_gh_pages.outputs.exists == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: NovaSharp Benchmarks
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          alert-threshold: ${{ github.event.inputs.alert_threshold || '115%' }}
          fail-on-alert: ${{ github.event.inputs.fail_on_alert == 'true' }}
          comment-on-alert: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Skip benchmark storage
        if: |
          steps.split_status.outputs.failed == 'true' ||
          steps.check_results_file.outputs.file_exists != 'true' ||
          (steps.check_gh_pages.outputs.exists == 'false' && !(github.event_name == 'push' && github.ref == 'refs/heads/main'))
        run: |
          if [ "${{ steps.split_status.outputs.failed }}" = "true" ]; then
            echo "::warning::Skipping benchmark storage because at least one split benchmark job failed."
          elif [ "${{ steps.check_results_file.outputs.file_exists }}" != "true" ]; then
            echo "::warning::Skipping benchmark storage because benchmark-results.json was not created."
          else
            echo "::warning::Skipping benchmark storage because gh-pages branch does not exist."
            echo "The gh-pages branch will be created on the next push to main."
          fi
          echo "Benchmark results are still available in the uploaded artifacts if any were produced."

      - name: Fail when split benchmark jobs failed
        if: steps.split_status.outputs.failed == 'true'
        run: |
          echo "::error::At least one split benchmark job failed. Inspect the matrix leg logs and uploaded artifacts."
          exit 1

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: benchmark-results
          path: |
            artifacts/benchmarkdotnet/
            benchmark-results.json
            artifacts/benchmark-deltas.md
            artifacts/benchmark-deltas.err
          if-no-files-found: warn
